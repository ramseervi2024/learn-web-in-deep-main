<!DOCTYPE html>
<html>
<head>
  <script src="/node_modules/@ffmpeg/ffmpeg/dist/umd/ffmpeg.js"></script>
  <script src="/node_modules/@ffmpeg/util/dist/umd/index.js"></script>
</head>
<body>
<button id="start">Start FFmpeg</button>
<script>
  document.getElementById('start').onclick = async () => {
    try {
      console.log("Starting load...");
      const { FFmpeg } = window.FFmpegWASM;
      const ff = new FFmpeg();
      ff.on("log", (e) => console.log("[FFmpeg]", e.message));
      await ff.load({
        coreURL: "/node_modules/@ffmpeg/core/dist/umd/ffmpeg-core.js",
        wasmURL: "/node_modules/@ffmpeg/core/dist/umd/ffmpeg-core.wasm",
        workerURL: "/node_modules/@ffmpeg/ffmpeg/dist/umd/814.ffmpeg.js"
      });
      console.log('Loaded successfully!');
      await ff.writeFile('test.txt', new Uint8Array([1, 2, 3]));
      console.log('Read success:', await ff.readFile('test.txt'));
    } catch (e) {
      console.error("FFmpeg load failed:", e);
    }
  };
</script>
</body>
</html>
